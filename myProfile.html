<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - iClass</title>
  <link rel="stylesheet" href="./styles.css">

  <style>
    .profile-container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px 40px;
    }

    .profile-title {
      margin-bottom: 24px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .profile-card {
      background: white;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .profile-card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      color: #0b5dbb;
    }

    .profile-row {
      margin-bottom: 16px;
    }

    .profile-row label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .profile-row input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #bdbdbd;
      border-radius: 4px;
    }

    .profile-row p {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #f9fafb;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .profile-btn {
      background-color: #1565d8;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .profile-btn:hover {
      background-color: #0f57bd;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="./index.html" class="navlink">
      <img src="./images/iClasslogo.jpg" class="logo-button">
    </a>

    <ul class="navlinks">
      <li><a href="./index.html" class="navlink jump-page-link" data-page="homePage">Home</a></li>
      <li><a href="./index.html" class="navlink jump-page-link" data-page="availablePage">Available Now</a></li>
      <li><a href="./index.html" class="navlink jump-page-link" data-page="schedulePage">All Schedules</a></li>
      <li><a href="./reserve.html" class="navlink">Reserve</a></li>
      <li><a href="./index.html" class="navlink jump-page-link" data-page="aboutPage">About</a></li>
      <li><a href="./index.html" class="navlink jump-page-link" data-page="rulesPage">Rules</a></li>
      <li><a href="./index.html" class="navlink jump-page-link" data-page="complaintsPage">Complaints</a></li>
      <li><a href="./myProfile.html" class="navlink active">My Profile</a></li>
      <li><a href="./signIn.html" class="navlink">Sign In</a></li>
    </ul>
  </nav>

  <main class="profile-container">
    <h1>My Profile</h1>

    <div class="profile-grid">
      <section class="profile-card">
        <h2>Basic Information</h2>

        <p><strong>Name:</strong> <span id="profileNameText">Not set</span></p>
        <p><strong>SJSU ID:</strong> <span id="profileStudentIdText">Not set</span></p>

        <div class="profile-actions">
          <button id="editProfileBtn" class="profile-btn">Edit</button>
        </div>
      </section>

      <section class="profile-card">
        <h2>Most Recent Reservation</h2>
        <div id="currentReservationContainer"></div>
      </section>
    </div>
  </main>

  <!-- ✅ FIX: navigation logic -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll(".jump-page-link").forEach(function (link) {
        link.addEventListener("click", function (event) {
          event.preventDefault()

          const pageId = link.dataset.page || "homePage"
          sessionStorage.setItem("targetPage", pageId)

          window.location.href = "./index.html"
        })
      })
    })
  </script>

  <!-- Your existing scripts -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
