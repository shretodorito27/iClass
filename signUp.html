<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iClass Sign Up</title>
  <link rel="stylesheet" href="./styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff7cc, #e6f2ff);
    }

    .signup-box {
      width: 420px;
      background-color: white;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 150px;
      margin-bottom: 20px;
    }

    .logo-section {
      text-align: center;
      padding: 30px 24px;
      border-bottom: 1px solid #d9d9d9;
    }

    .logo-section h1 {
      margin: 0;
      color: #0b5dbb;
      font-size: 34px;
    }

    .logo-section p {
      margin: 8px 0 0;
      color: #c28a1d;
      font-size: 15px;
    }

    .form-section {
      padding: 35px 42px 40px;
    }

    .form-section h2 {
      text-align: center;
      margin-bottom: 28px;
      font-size: 18px;
      color: #444;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #9e9e9e;
      border-radius: 2px;
    }

    input:focus {
      border-color: #1565d8;
    }

    .error-message {
      color: #d93025;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .signup-btn {
      width: 100%;
      background-color: #1565d8;
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      border-radius: 3px;
      cursor: pointer;
    }

    .signup-btn:hover {
      background-color: #0f57bd;
    }

    .bottom-link {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
    }

    .bottom-link a {
      color: #1565d8;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="signup-box">
    <div class="logo-section">
      <img src="images/iClasslogo.jpg" class="logo" />
      <h1>iClass</h1>
      <p>Engineering Building Open Classroom Search</p>
    </div>

    <div class="form-section">
      <h2>Sign Up</h2>

      <form id="signupForm">
        <div class="form-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="Enter your SJSU email" />
          <div id="emailError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" />
          <div id="passwordError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input id="confirmPassword" type="password" />
          <div id="confirmPasswordError" class="error-message"></div>
        </div>

        <div id="signupServerMessage" class="error-message"></div>

        <button class="signup-btn" type="submit">Sign Up</button>

        <div class="bottom-link">
          <a href="signIn.html">Already have an account? Sign In</a><br>
          <a href="index.html">Back to home</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById("signupForm")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const confirmPasswordInput = document.getElementById("confirmPassword")

    signupForm.addEventListener("submit", async function (e) {
      e.preventDefault()

      try {
        const response = await fetch("/api/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value,
            confirmPassword: confirmPasswordInput.value
          })
        })

        if (!response.ok) {
          document.getElementById("signupServerMessage").textContent = "Sign up failed"
          return
        }

        window.location.href = "signUpSuccess.html"
      } catch {
        document.getElementById("signupServerMessage").textContent = "Server error"
      }
    })
  </script>

</body>
</html>
