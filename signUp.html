<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iClass Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff7cc, #e6f2ff);
    }

    .signup-box {
      width: 420px;
      background-color: white;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 150px;
      max-width: 100%;
      margin-bottom: 20px;
    }

    .logo-section {
      text-align: center;
      padding: 30px 24px;
      border-bottom: 1px solid #d9d9d9;
    }

    .logo-section h1 {
      margin: 0;
      color: #0b5dbb;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .logo-section p {
      margin: 8px 0 0;
      color: #c28a1d;
      font-size: 15px;
      line-height: 1.4;
    }

    .form-section {
      padding: 35px 42px 40px;
    }

    .form-section h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 28px;
      font-size: 18px;
      color: #444;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #222;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #9e9e9e;
      border-radius: 2px;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1565d8;
    }

    .error-message {
      color: #d93025;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .success-message {
      color: #1e8e3e;
      font-size: 14px;
      margin-top: 8px;
      display: none;
      line-height: 1.5;
    }

    .signup-btn {
      width: 100%;
      background-color: #1565d8;
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 10px;
    }

    .signup-btn:hover {
      background-color: #0f57bd;
    }

    .bottom-link {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #555;
    }

    .bottom-link a {
      color: #1565d8;
      text-decoration: underline;
      font-weight: 500;
    }

    .bottom-link a:hover {
      color: #0f57bd;
    }
  </style>
</head>
<body>
  <div class="signup-box">
    <div class="logo-section">
      <img src="images/iClasslogo.jpg" alt="iClass Logo" class="logo" />
      <h1>iClass</h1>
      <p>Engineering Building Open Classroom Search</p>
    </div>

    <div class="form-section">
      <h2>Sign Up</h2>

      <form id="signupForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your SJSU email"
          />
          <div id="emailError" class="error-message">
            Email must end with @sjsu.edu
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
          />
          <div id="passwordError" class="error-message">
            Password must be longer than 6 characters
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter your password"
          />
          <div id="confirmPasswordError" class="error-message">
            The two passwords do not match
          </div>
        </div>

        <div id="signupServerMessage" class="error-message"></div>
        <div id="signupSuccessMessage" class="success-message"></div>

        <button type="submit" class="signup-btn">Sign Up</button>

        <div class="bottom-link">
          Already have an account?
          <a href="signIn.html">Sign In</a><br>
          <a href="index.html">Back to home</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById("signupForm")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const confirmPasswordInput = document.getElementById("confirmPassword")
    const emailError = document.getElementById("emailError")
    const passwordError = document.getElementById("passwordError")
    const confirmPasswordError = document.getElementById("confirmPasswordError")
    const signupServerMessage = document.getElementById("signupServerMessage")
    const signupSuccessMessage = document.getElementById("signupSuccessMessage")

    function hideSignupMessages() {
      signupServerMessage.style.display = "none"
      signupSuccessMessage.style.display = "none"
    }

    function validateEmail() {
      const emailValue = emailInput.value.trim().toLowerCase()

      if (!emailValue.endsWith("@sjsu.edu")) {
        emailError.textContent = "Email must end with @sjsu.edu"
        emailError.style.display = "block"
        return false
      }

      emailError.style.display = "none"
      return true
    }

    function validatePassword() {
      const passwordValue = passwordInput.value

      if (passwordValue.length <= 6) {
        passwordError.textContent = "Password must be longer than 6 characters"
        passwordError.style.display = "block"
        return false
      }

      passwordError.style.display = "none"
      return true
    }

    function validateConfirmPassword() {
      if (confirmPasswordInput.value !== passwordInput.value) {
        confirmPasswordError.textContent = "The two passwords do not match"
        confirmPasswordError.style.display = "block"
        return false
      }

      confirmPasswordError.style.display = "none"
      return true
    }

    emailInput.addEventListener("input", function () {
      validateEmail()
      hideSignupMessages()
    })

    passwordInput.addEventListener("input", function () {
      validatePassword()
      validateConfirmPassword()
      hideSignupMessages()
    })

    confirmPasswordInput.addEventListener("input", function () {
      validateConfirmPassword()
      hideSignupMessages()
    })

    signupForm.addEventListener("submit", async function (event) {
      event.preventDefault()
      hideSignupMessages()

      const isEmailValid = validateEmail()
      const isPasswordValid = validatePassword()
      const isConfirmPasswordValid = validateConfirmPassword()

      if (!isEmailValid || !isPasswordValid || !isConfirmPasswordValid) {
        return
      }

      try {
        const response = await fetch("/api/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value,
            confirmPassword: confirmPasswordInput.value
          })
        })

        const result = await response.json()

        if (!response.ok) {
          if (result.field === "email") {
            emailError.textContent = result.message
            emailError.style.display = "block"
          } else if (result.field === "password") {
            passwordError.textContent = result.message
            passwordError.style.display = "block"
          } else if (result.field === "confirmPassword") {
            confirmPasswordError.textContent = result.message
            confirmPasswordError.style.display = "block"
          } else {
            signupServerMessage.textContent = result.message
            signupServerMessage.style.display = "block"
          }
          return
        }

        signupForm.reset()
        window.location.href = "signUpSuccess.html"
      } catch (error) {
        signupServerMessage.textContent = "Unable to connect to the server"
        signupServerMessage.style.display = "block"
      }
    })
  </script>
</body>
</html>
